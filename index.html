<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>חמ"ל סייבר - איראן והאזור</title>
    <style>
        /* הגדרות בסיס - מראה "סייבר" */
        body { 
            font-family: 'Courier New', Courier, monospace; /* פונט "קוד" חדיש */
            background-color: #000; 
            background-image: 
                linear-gradient(rgba(0, 255, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 0, 0.05) 1px, transparent 1px);
            background-size: 20px 20px; /* רשת קווי דטה ברקע */
            color: #0f0; /* ירוק ניאון */
            margin: 0; 
            padding: 20px; 
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.7); /* אפקט זוהר */
        }

        .container { max-width: 1000px; margin: auto; }

        /* כותרת ראשית עם אפקט תקלה (Glitch) קטן */
        h1 { 
            text-align: center; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            border-bottom: 3px double #0f0; 
            padding-bottom: 15px; 
            margin-bottom: 40px; 
            color: #fff; 
            text-shadow: 0 0 10px #0f0, 0 0 20px #0f0; 
        }

        #news-container { display: flex; flex-direction: column; gap: 10px; }

        /* עיצוב הכתבה כ"שורת פלט צבאי" */
        .news-card { 
            background: rgba(0, 20, 0, 0.8); /* ירוק כהה שקוף */
            border-bottom: 1px solid #0f0; 
            padding: 15px; 
            text-align: left; 
            direction: ltr; 
            transition: all 0.2s ease-in-out; 
            position: relative;
            overflow: hidden;
        }

        /* סמן terminal בתחילת השורה */
        .news-card::before {
            content: "> ";
            color: #fff;
            font-weight: bold;
        }

        /* אפקט מעבר (Hover) */
        .news-card:hover { 
            background: rgba(0, 255, 0, 0.1); 
            transform: scale(1.01); 
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
        }

        /* תגית המקור - חדה וטכנולוגית */
        .source-tag { 
            display: inline-block; 
            padding: 2px 10px; 
            border: 1px solid #0f0; 
            background: #000;
            color: #fff; 
            font-size: 11px; 
            font-weight: bold; 
            text-transform: uppercase; 
            margin-bottom: 8px; 
            text-shadow: none;
        }

        /* קישור הכתבה - לבן וזוהר */
        .news-card a { 
            color: #fff; 
            text-decoration: none; 
            font-size: 18px; 
            font-weight: bold; 
            display: inline; 
            margin-bottom: 10px; 
            text-shadow: 0 0 5px #fff;
        }

        .meta { 
            font-size: 11px; 
            color: rgba(0, 255, 0, 0.6); 
            margin-top: 8px; 
        }

        /* טוען - אפקט מהבהב */
        #loader { 
            text-align: center; 
            padding: 50px; 
            font-size: 22px; 
            animation: blink 1s infinite; 
        }

        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>[[ חמ"ל סייבר: עדכוני איראן ]]</h1>
        <div id="loader">סורק מקורות גלובליים...</div>
        <div id="news-container"></div>
    </div>

    <script>
        async function fetchCyberNews() {
    const container = document.getElementById('news-container');
    const loader = document.getElementById('loader');
    
    // החלף את הטקסט למטה במפתח שקיבלת מהאתר
    const API_KEY = 'pub_c87ecc1c01bd4cc2856e1342b69a4512'; 
    
    // שאילתה שמחפשת בבת אחת 10+ מקורות על איראן והמלחמה
    const url = `https://newsdata.io/api/1/news?apikey=${API_KEY}&q=iran%20AND%20(war%20OR%20military%20OR%20strike)&language=en`;

    try {
        const response = await fetch(url);
        const data = await response.json();

        if (data.status !== "success") throw new Error("API Limit reached");

        loader.style.display = 'none';
        
        // הצגת התוצאות מהמקורות השונים (Reuters, AP, CNN וכו')
        container.innerHTML = data.results.map(art => `
            <div class="news-card">
                <span class="source-tag">${art.source_id.toUpperCase()}</span><br>
                <a href="${art.link}" target="_blank">${art.title}</a>
                <div class="meta">${new Date(art.pubDate).toLocaleString('he-IL')} // DATA_STREAM_ENCRYPTED</div>
            </div>
        `).join('');

    } catch (e) {
        console.error("SYSTEM ERROR:", e);
        // אם יש שגיאה, המערכת חוזרת אוטומטית לגרדיאן שעובד לך בטוח
        fetchGuardianFallback();
    }
}

// פונקציית גיבוי למקרה שה-API נחסם
async function fetchGuardianFallback() {
    const url = 'https://content.guardianapis.com/search?q=iran%20war&api-key=test';
    const response = await fetch(url);
    const data = await response.json();
    document.getElementById('news-container').innerHTML = data.response.results.map(item => `
        <div class="news-card">
            <span class="source-tag">THE GUARDIAN (SECURE_LINK)</span><br>
            <a href="${item.webUrl}" target="_blank">${item.webTitle}</a>
            <div class="meta">${new Date(item.webPublicationDate).toLocaleString('he-IL')} // FALLBACK_ACTIVE</div>
        </div>
    `).join('');
}

fetchCyberNews();
setInterval(fetchCyberNews, 600000); // רענון כל 10 דקות
    </script>
</body>
</html>
